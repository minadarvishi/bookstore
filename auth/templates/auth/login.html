{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h3 class="text-center">ورود به حساب کاربری</h3>
            <hr>
            <form method="POST">
                <div class="mb-3">
                    <label>ایمیل</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>رمز عبور</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="remember" class="form-check-input" id="rem">
                    <label class="form-check-label" for="rem">مرا به خاطر بسپار</label>
                </div>
                <button type="submit" class="btn btn-success w-100">ورود</button>
            </form>
            <p class="mt-3 text-center">
                کاربر جدید هستید؟ <a href="{{ url_for('auth.register') }}">ساخت حساب</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
