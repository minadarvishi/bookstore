{% extends "layout.html" %}
{% block title %}ثبت‌نام حساب کاربری{% endblock %}
{% block content %}
  <main class="main">

    <div class="page-title light-background">
      <div class="container d-lg-flex justify-content-between align-items-center">
        <h1 class="mb-2 mb-lg-0">ثبت‌نام</h1>
      </div>
    </div><section id="login" class="login section">

      <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="row justify-content-center align-items-center">
          
          <div class="col-lg-5 d-none d-lg-block" data-aos="fade-left">
            <img src="{{ url_for('static', filename='assets/img/login.png') }}" class="img-fluid" alt="ثبت‌نام">
          </div>

          <div class="col-lg-5 col-md-8" style="margin-top: 40px; margin-bottom: 40px;">
            <div class="auth-container" data-aos="fade-in" data-aos-delay="200">

              <div class="auth-form login-form active">
                <div class="form-header">
                  <h3 style="color:#5d4b38; font-weight: bold;">ثبت‌نام کاربر جدید</h3>
                  <p class="text-muted">لطفاً اطلاعات خود را برای ساخت حساب کاربری وارد کنید.</p>
                </div>

                <form class="auth-form-content" method="POST">
                  
                  <div class="input-group mb-3 d-flex flex-row-reverse">
                    <input type="text" class="form-control text-end" placeholder="نام و نام‌خانوادگی" required autocomplete="name" name="name">
                    <span class="input-icon d-flex align-items-center justify-content-center">
                      <i class="bi bi-person"></i>
                    </span>
                  </div>

                  <div class="input-group mb-3 d-flex flex-row-reverse">
                    <input type="email" class="form-control text-end" placeholder="ایمیل" required autocomplete="email" name="email">
                    <span class="input-icon d-flex align-items-center justify-content-center">
                      <i class="bi bi-envelope"></i>
                    </span>
                  </div>

                  <div class="input-group mb-4 d-flex flex-row-reverse">
                    <input type="password" class="form-control text-end" placeholder="رمز عبور" required autocomplete="new-password" name="password">
                    <span class="input-icon d-flex align-items-center justify-content-center">
                      <i class="bi bi-lock"></i>
                    </span>
                  </div>

                  <button type="submit" class="auth-btn primary-btn mb-3" style="background-color: #5d4b38; width: 100%;">
                    <span>ثبت‌نام</span>
                    <i class="bi bi-arrow-left" style="margin-right: 8px; margin-left: 0;"></i>
                  </button>

                </form>

                <div class="switch-form text-center mt-3">
                  <span>قبلاً ثبت‌نام کرده‌اید؟</span>
                  <a href="{{ url_for('auth.login') }}" style="color: #5d4b38; font-weight: bold; text-decoration: none; margin-right: 5px;">وارد شوید</a>
                </div>

              </div>

            </div>
          </div>

        </div>

      </div>

    </section></main>
{% endblock %}
